# Org Chart Access Configuration
# Version for forward compatibility with future schema changes
version: "1.0"

# Tool definitions with role hierarchies (ordered least → most privileged).
# color: used for badge background in the org chart.
tools:
  jira:
    display_name: "Jira"
    color: "#0052CC"
    badge_threshold: 2   # org_admin and above (not project/board admins)
    roles:
      - id: member
        label: "Member"
      - id: project_admin
        label: "Project Admin"
      - id: org_admin
        label: "Org Admin"

  github:
    display_name: "GitHub"
    color: "#24292E"
    badge_threshold: 2   # org_owner only (not per-repo maintainers)
    roles:
      - id: member
        label: "Member"
      - id: maintainer
        label: "Maintainer"
      - id: org_owner
        label: "Org Owner"

  salesforce:
    display_name: "Salesforce"
    color: "#00A1E0"
    badge_threshold: 1   # admin and above
    roles:
      - id: user
        label: "User"
      - id: admin
        label: "Admin"
      - id: system_admin
        label: "System Admin"

  okta:
    display_name: "Okta"
    color: "#007DC1"
    badge_threshold: 1   # admin and above
    roles:
      - id: user
        label: "User"
      - id: admin
        label: "Admin"
      - id: super_admin
        label: "Super Admin"

  databricks:
    display_name: "Databricks"
    color: "#E87722"
    badge_threshold: 1   # workspace_admin and above
    roles:
      - id: user
        label: "User"
      - id: workspace_admin
        label: "Workspace Admin"
      - id: account_admin
        label: "Account Admin"

  aws:
    display_name: "AWS"
    color: "#FF9900"
    badge_threshold: 2   # admin only (not developers or power users)
    roles:
      - id: developer
        label: "Developer"
      - id: power_user
        label: "Power User"
      - id: admin
        label: "Admin"

  chorus:
    display_name: "Chorus"
    color: "#7C4DFF"
    badge_threshold: 1   # admin and above
    roles:
      - id: user
        label: "User"
      - id: admin
        label: "Admin"
      - id: super_admin
        label: "Super Admin"

  slack:
    display_name: "Slack"
    color: "#4A154B"
    badge_threshold: 1   # admin and above
    roles:
      - id: member
        label: "Member"
      - id: admin
        label: "Admin"
      - id: workspace_owner
        label: "Workspace Owner"

  google:
    display_name: "Google"
    color: "#4285F4"
    badge_threshold: 1   # admin and above
    roles:
      - id: user
        label: "User"
      - id: admin
        label: "Admin"
      - id: super_admin
        label: "Super Admin"

  adp:
    display_name: "ADP"
    color: "#D40000"
    badge_threshold: 1   # admin and above
    roles:
      - id: user
        label: "User"
      - id: admin
        label: "Admin"
      - id: super_admin
        label: "Super Admin"

# Per-person access grants.
# Key must exactly match the NAME column in roster.xlsx ("Last, First" format).
# source: "manual" for hand-maintained entries.
#         Future API integrations will write "jira_api", "github_api", etc.
# scope:  Optional free-form string for resource-level specificity.
#         Examples: "project:PLATFORM", "account:prod", "org:acme-corp"
#         null means org-wide / global.
access:
  "Chivukula, Ravi Kumar":
